<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Dashboard Pro - Analisi YoY</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #94a3b8; --success: #059669; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1100px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.75rem; color: #64748b; padding: 10px 5px; border-bottom: 1px solid #e2e8f0; }
        td { padding: 8px 5px; border-bottom: 1px solid #f1f5f9; }
        
        input { width: 85%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
        
        .diff-pos { color: var(--success); font-weight: bold; font-size: 0.85rem; }
        .diff-neg { color: var(--danger); font-weight: bold; font-size: 0.85rem; }
        .diff-null { color: #94a3b8; font-size: 0.85rem; }

        .btn-save { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; margin-top: 15px; }
        .btn-save:hover { background: #1d4ed8; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-box { background: #f1f5f9; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; }

        #msg { text-align: center; color: var(--success); height: 20px; margin-top: 10px; font-weight: bold; font-size: 0.9rem; }
        
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 30px;">Analisi Performance Mensile YoY</h2>
    
    <div class="grid">
        <!-- SEZIONE INPUT E ANALISI MENSILE -->
        <div class="card">
            <h3>Dati Mensili e Variazione %</h3>
            <table>
                <thead>
                    <tr>
                        <th>MESE</th>
                        <th>2026 (€)</th>
                        <th>2025 (€)</th>
                        <th style="text-align:right">VAR. %</th>
                    </tr>
                </thead>
                <tbody id="tabellaMesi"></tbody>
            </table>
            <button class="btn-save" onclick="salvaTutto()">💾 SALVA E SINCRONIZZA</button>
            <div id="msg"></div>
        </div>

        <!-- DASHBOARD RISULTATI -->
        <div>
            <div class="card">
                <h3>Trend Grafico</h3>
                <canvas id="mioGrafico"></canvas>
            </div>
            
            <div class="card">
                <h3>Riepilogo Annuale</h3>
                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="stat-label">Proiezione Fine Anno</span>
                        <span id="stimaAttuale" class="stat-value" style="color:var(--primary)">0€</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Crescita Totale</span>
                        <span id="crescita" class="stat-value">0%</span>
                    </div>
                </div>
                <div id="analisiTarget" style="margin-top:20px; padding:15px; background:#fff8eb; border-radius:8px; font-size:0.9rem; border-left:4px solid #f59e0b;">
                    Inserisci i dati per calcolare il target verso 1M.
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const mesiNomi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
    let chart;

    const tbody = document.getElementById('tabellaMesi');
    mesiNomi.forEach((mese, i) => {
        const row = document.createElement('tr');
        const valC = localStorage.getItem('c_'+i) || '';
        const valP = localStorage.getItem('p_'+i) || '';
        
        row.innerHTML = `
            <td style="font-weight:bold; font-size:0.85rem">${mese}</td>
            <td><input type="number" class="in-c" data-i="${i}" value="${valC}" oninput="aggiornaTutto()"></td>
            <td><input type="number" class="in-p" data-i="${i}" value="${valP}" oninput="aggiornaTutto()"></td>
            <td id="diff-${i}" style="text-align:right">-</td>
        `;
        tbody.appendChild(row);
    });

    function aggiornaTutto() {
        const datiC = Array.from(document.querySelectorAll('.in-c')).map(i => parseFloat(i.value) || 0);
        const datiP = Array.from(document.querySelectorAll('.in-p')).map(i => parseFloat(i.value) || 0);
        
        let totaleC = 0; let mesiC = 0; let totaleP = 0;

        datiC.forEach((v, i) => {
            const p = datiP[i];
            const diffCell = document.getElementById(`diff-${i}`);
            
            // Calcolo Differenza Mensile
            if (v > 0 && p > 0) {
                const varPerc = ((v - p) / p * 100).toFixed(1);
                if (varPerc > 0) {
                    diffCell.innerHTML = `<span class="diff-pos">↑ ${varPerc}%</span>`;
                } else if (varPerc < 0) {
                    diffCell.innerHTML = `<span class="diff-neg">↓ ${Math.abs(varPerc)}%</span>`;
                } else {
                    diffCell.innerHTML = `<span class="diff-null">0%</span>`;
                }
            } else {
                diffCell.innerText = "-";
            }

            if(v > 0) { totaleC += v; mesiC++; }
            totaleP += p;
        });

        // Proiezione e Target
        const proiezioneC = mesiC > 0 ? (totaleC / mesiC) * 12 : 0;
        const crescitaGen = totaleP > 0 ? ((proiezioneC - totaleP) / totaleP * 100).toFixed(1) : 0;

        document.getElementById('stimaAttuale').innerText = proiezioneC.toLocaleString('it-IT', {maximumFractionDigits:0}) + " €";
        document.getElementById('crescita').innerText = (crescitaGen > 0 ? "+" : "") + crescitaGen + "%";
        document.getElementById('crescita').style.color = crescitaGen >= 0 ? "var(--success)" : "var(--danger)";

        // Target 1M
        const analisi = document.getElementById('analisiTarget');
        if (proiezioneC < 1000000) {
            const residuo = (1000000 - totaleC) / (12 - mesiC);
            analisi.innerHTML = `Per il milione mancano <b>${(1000000 - proiezioneC).toLocaleString('it-IT')}€</b> sulla stima.<br>Target mesi restanti: <b>${mesiC < 12 ? residuo.toLocaleString('it-IT', {maximumFractionDigits:0}) : 0}€/mese</b>.`;
        } else {
            analisi.innerHTML = "✨ <b>Target Milione Raggiunto!</b> Mantieni questa media per chiudere l'anno in bellezza.";
        }

        disegnaGrafico(datiC, datiP);
    }

    function disegnaGrafico(corrente, passato) {
        const ctx = document.getElementById('mioGrafico').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: mesiNomi.map(m => m.substr(0,3)),
                datasets: [
                    { label: '2026', data: corrente.map(v => v || null), borderColor: '#2563eb', tension: 0.3, fill: false, borderWidth: 3 },
                    { label: '2025', data: passato, borderColor: '#cbd5e1', tension: 0.3, fill: false, borderDash: [5,5] }
                ]
            },
            options: { plugins: { legend: { position: 'bottom' } }, scales: { y: { beginAtZero: true } } }
        });
    }

    function salvaTutto() {
        document.querySelectorAll('.in-c').forEach((el, i) => localStorage.setItem('c_'+i, el.value));
        document.querySelectorAll('.in-p').forEach((el, i) => localStorage.setItem('p_'+i, el.value));
        const msg = document.getElementById('msg');
        msg.innerText = "✓ Tutti i dati sono stati salvati!";
        setTimeout(() => msg.innerText = "", 3000);
    }

    window.onload = aggiornaTutto;
</script>

</body>
</html>
