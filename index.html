<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulatore Spese – V3</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-shell">
  <h1>Simulatore Spese</h1>

  <section class="card">
    <h2>Dati iniziali</h2>
    <label>Saldo attuale (€)</label>
    <input id="currentBalance" type="number" step="0.01" />
    <label>Soglia minima (€)</label>
    <input id="safetyThreshold" type="number" step="0.01" />
  </section>

  <section class="card grid">
    <div>
      <span>Saldo stimato fine mese</span>
      <strong id="endMonthBalance">€ 0,00</strong>
    </div>
    <div>
      <span>Saldo stimato al 31/12</span>
      <strong id="endYearBalance">€ 0,00</strong>
    </div>
  </section>

  <section class="card">
    <h2>Andamento saldo</h2>
    <canvas id="balanceChart"></canvas>
  </section>
</div>
<script src="script.js"></script>
</body>
</html>
