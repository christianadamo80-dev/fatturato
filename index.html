<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Dashboard Pro + Cassa & Cloud Backup</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #94a3b8; --success: #059669; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1100px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.75rem; color: #64748b; padding: 10px 5px; border-bottom: 1px solid #e2e8f0; }
        td { padding: 8px 5px; border-bottom: 1px solid #f1f5f9; }
        
        input, select { width: 85%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
        
        .btn { color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; transition: background 0.2s; }
        .btn-save { background: var(--primary); margin-top: 15px; }
        .btn-save:hover { background: #1d4ed8; }
        .btn-add { background: var(--success); width: auto; padding: 8px 20px; }
        .btn-add:hover { background: #047857; }
        
        /* Sezione Backup Estesa */
        .backup-title { font-size: 0.85rem; font-weight: bold; color: #64748b; margin-top: 15px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;}
        .backup-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-backup { background: #475569; font-size: 0.8rem; padding: 10px; text-align: center; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; }
        .btn-backup:hover { background: #334155; }
        .btn-text-backup { background: #0284c7; }
        .btn-text-backup:hover { background: #0369a1; }
        
        .quick-cash { display: flex; gap: 10px; align-items: flex-end; margin-top: 10px; }
        .quick-cash div { display: flex; flex-direction: column; gap: 4px; }

        .diff-pos { color: var(--success); font-weight: bold; font-size: 0.85rem; }
        .diff-neg { color: var(--danger); font-weight: bold; font-size: 0.85rem; }
        .diff-null { color: #94a3b8; font-size: 0.85rem; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-box { background: #f1f5f9; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; }

        #msg, #msg-cassa { text-align: center; color: var(--success); height: 20px; font-weight: bold; font-size: 0.9rem; margin-top: 5px; }
        
        .btn-reset { display: block; margin: 20px auto 0; background: none; border: none; color: #ef4444; cursor: pointer; font-size: 0.8rem; text-decoration: underline; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 30px;">Analisi Performance Mensile & Cassa</h2>
    
    <!-- REGISTRA VENDITA AL VOLO -->
    <div class="card">
        <h3>➕ Registra Nuova Vendita</h3>
        <div class="quick-cash">
            <div style="flex: 2;">
                <label style="font-size: 0.8rem; font-weight: bold; color: #64748b;">Importo Vendita (€)</label>
                <input type="number" id="importoVendita" placeholder="Es. 1500" step="any">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 0.8rem; font-weight: bold; color: #64748b;">Mese destinazione</label>
                <select id="meseSelezione"></select>
            </div>
            <button class="btn btn-add" onclick="aggiungiVendita()">Aggiungi al Mese</button>
        </div>
        <div id="msg-cassa"></div>
    </div>

    <div class="grid">
        <!-- SEZIONE TABELLA -->
        <div class="card">
            <h3>Dati Mensili e Variazione %</h3>
            <table>
                <thead>
                    <tr>
                        <th>MESE</th>
                        <th>2026 (€)</th>
                        <th>2025 (€)</th>
                        <th style="text-align:right">VAR. %</th>
                    </tr>
                </thead>
                <tbody id="tabellaMesi"></tbody>
            </table>
            <button class="btn btn-save" onclick="salvaTutto()">💾 SALVA TUTTO NEL BROWSER</button>
            <div id="msg"></div>

            <!-- OPZIONE 1: BACKUP TRAMITE FILE (PER GOOGLE DRIVE) -->
            <div class="backup-title">Metodo 1: Backup tramite file (.json)</div>
            <div class="backup-zone">
                <button class="btn-backup" onclick="esportaBackup()">📥 Esporta File</button>
                <label class="btn-backup">
                    📤 Importa File
                    <input type="file" id="importFile" accept=".json" onchange="importaBackup(this)" style="display:none;">
                </label>
            </div>

            <!-- OPZIONE 2: BACKUP RAPIDO COPIA/INCOLLA -->
            <div class="backup-title">Metodo 2: Sincronizzazione rapida Copia/Incolla</div>
            <div class="backup-zone">
                <button class="btn-backup btn-text-backup" onclick="copiaTestoBackup()">📋 Copia Dati (Testo)</button>
                <button class="btn-backup btn-text-backup" onclick="incollaTestoBackup()">📥 Incolla Dati (Testo)</button>
            </div>
        </div>

        <!-- DASHBOARD RISULTATI -->
        <div>
            <div class="card">
                <h3>Trend Grafico</h3>
                <canvas id="mioGrafico"></canvas>
            </div>
            
            <div class="card">
                <h3>Riepilogo Annuale</h3>
                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="stat-label">Proiezione Fine Anno</span>
                        <span id="stimaAttuale" class="stat-value" style="color:var(--primary)">0€</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Crescita Totale</span>
                        <span id="crescita" class="stat-value">0%</span>
                    </div>
                </div>
                <div id="analisiTarget" style="margin-top:20px; padding:15px; background:#fff8eb; border-radius:8px; font-size:0.9rem; border-left:4px solid #f59e0b;"></div>
            </div>
        </div>
    </div>
    <button class="btn-reset" onclick="resetDati()">Azzera tutto per il nuovo anno</button>
</div>

<script>
    const mesiNomi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
    let chart;

    const tbody = document.getElementById('tabellaMesi');
    const selectMese = document.getElementById('meseSelezione');
    const meseCorrenteReale = new Date().getMonth();

    mesiNomi.forEach((mese, i) => {
        const row = document.createElement('tr');
        const valC = localStorage.getItem('c_'+i) || '';
        const valP = localStorage.getItem('p_'+i) || '';
        
        row.innerHTML = `
            <td style="font-weight:bold; font-size:0.85rem">${mese}</td>
            <td><input type="number" class="in-c" id="input-c-${i}" data-i="${i}" value="${valC}" oninput="aggiornaTutto()"></td>
            <td><input type="number" class="in-p" id="input-p-${i}" data-i="${i}" value="${valP}" oninput="aggiornaTutto()"></td>
            <td id="diff-${i}" style="text-align:right">-</td>
        `;
        tbody.appendChild(row);

        const opt = document.createElement('option');
        opt.value = i; opt.innerText = mese;
        if(i === meseCorrenteReale) opt.selected = true;
        selectMese.appendChild(opt);
    });

    function aggiungiVendita() {
        const importoInput = document.getElementById('importoVendita');
        const valoreVendita = parseFloat(importoInput.value);
        const meseSelezionato = document.getElementById('meseSelezione').value;
        const msgCassa = document.getElementById('msg-cassa');

        if (isNaN(valoreVendita) || valoreVendita <= 0) {
            alert("Inserisci un importo valido."); return;
        }

        const inputMeseCorrente = document.getElementById(`input-c-${meseSelezionato}`);
        const vecchioValore = parseFloat(inputMeseCorrente.value) || 0;
        inputMeseCorrente.value = (vecchioValore + valoreVendita).toFixed(2);

        msgCassa.innerText = `€ ${valoreVendita.toLocaleString('it-IT')} aggiunti a ${mesiNomi[meseSelezionato]}!`;
        importoInput.value = "";
        setTimeout(() => { msgCassa.innerText = ""; }, 3000);
        salvaTutto();
    }

    function aggiornaTutto() {
        const datiC = Array.from(document.querySelectorAll('.in-c')).map(i => parseFloat(i.value) || 0);
        const datiP = Array.from(document.querySelectorAll('.in-p')).map(i => parseFloat(i.value) || 0);
        let totaleC = 0; let mesiC = 0; let totaleP = 0;

        datiC.forEach((v, i) => {
            const p = datiP[i];
            const diffCell = document.getElementById(`diff-${i}`);
            
            if (v > 0 && p > 0) {
                const varPerc = ((v - p) / p * 100).toFixed(1);
                if (varPerc > 0) diffCell.innerHTML = `<span class="diff-pos">↑ ${varPerc}%</span>`;
                else if (varPerc < 0) diffCell.innerHTML = `<span class="diff-neg">↓ ${Math.abs(varPerc)}%</span>`;
                else diffCell.innerHTML = `<span class="diff-null">0%</span>`;
            } else { diffCell.innerText = "-"; }

            if(v > 0) { totaleC += v; mesiC++; }
            totaleP += p;
        });

        const proiezioneC = mesiC > 0 ? (totaleC / mesiC) * 12 : 0;
        const crescitaGen = totaleP > 0 ? ((proiezioneC - totaleP) / totaleP * 100).toFixed(1) : 0;

        document.getElementById('stimaAttuale').innerText = proiezioneC.toLocaleString('it-IT', {maximumFractionDigits:0}) + " €";
        document.getElementById('crescita').innerText = (crescitaGen > 0 ? "+" : "") + crescitaGen + "%";
        document.getElementById('crescita').style.color = crescitaGen >= 0 ? "var(--success)" : "var(--danger)";

        const analisi = document.getElementById('analisiTarget');
        if (proiezioneC < 1000000) {
            const residuo = (1000000 - totaleC) / (12 - mesiC);
            analisi.innerHTML = `Mancano <b>${(1000000 - proiezioneC).toLocaleString('it-IT')}€</b> alla stima del milione.<br>Target mesi rimasti: <b>${mesiC < 12 ? residuo.toLocaleString('it-IT', {maximumFractionDigits:0}) : 0}€/mese</b>.`;
        } else {
            analisi.innerHTML = "✨ <b>Target Milione Raggiunto!</b> Mantieni questa media per chiudere l'anno in bellezza.";
        }
        disegnaGrafico(datiC, datiP);
    }

    function disegnaGrafico(corrente, passato) {
        const ctx = document.getElementById('mioGrafico').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: mesiNomi.map(m => m.substr(0,3)),
                datasets: [
                    { label: 'Anno Corrente', data: corrente.map(v => v || null), borderColor: '#2563eb', tension: 0.3, fill: false, borderWidth: 3 },
                    { label: 'Anno Precedente', data: passato, borderColor: '#cbd5e1', tension: 0.3, fill: false, borderDash: [5,5] }
                ]
            },
            options: { plugins: { legend: { position: 'bottom' } }, scales: { y: { beginAtZero: true } } }
        });
    }

    function salvaTutto() {
        document.querySelectorAll('.in-c').forEach((el, i) => localStorage.setItem('c_'+i, el.value));
        document.querySelectorAll('.in-p').forEach((el, i) => localStorage.setItem('p_'+i, el.value));
        const msg = document.getElementById('msg');
        msg.innerText = "✓ Dati salvati e grafici sincronizzati!";
        setTimeout(() => { msg.innerText = ""; }, 3000);
        aggiornaTutto();
    }

    function ottieniOggettoDati() {
        let datiBackup = { corrente: [], precedente: [] };
        for(let i=0; i<12; i++) {
            datiBackup.corrente.push(localStorage.getItem('c_'+i) || '');
            datiBackup.precedente.push(localStorage.getItem('p_'+i) || '');
        }
        return datiBackup;
    }

    function applicaOggettoDati(dati) {
        if(dati.corrente && dati.precedente) {
            for(let i=0; i<12; i++) {
                localStorage.setItem('c_'+i, dati.corrente[i]);
                localStorage.setItem('p_'+i, dati.precedente[i]);
                document.getElementById(`input-c-${i}`).value = dati.corrente[i];
                document.getElementById(`input-p-${i}`).value = dati.precedente[i];
            }
            aggiornaTutto();
            return true;
        }
        return false;
    }

    // INTERFACCIA FILE BACKUP
    function esportaBackup() {
        const dati = ottieniOggettoDati();
        const blob = new Blob([JSON.stringify(dati)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backup_fatturato_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function importaBackup(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                if (applicaOggettoDati(JSON.parse(e.target.result))) alert("✓ Backup importato dal file!");
                else alert("File non valido.");
            } catch (err) { alert("Errore nel file."); }
        };
        reader.readAsText(file);
    }

    // NUOVA FUNZIONE: INTERFACCIA COPIA/INCOLLA TESTO (SENZA FILE)
    function copiaTestoBackup() {
        const dati = ottieniOggettoDati();
        const stringaTesto = btoa(JSON.stringify(dati)); // Codifica il testo in una stringa pulita
        navigator.clipboard.writeText(stringaTesto).then(() => {
            alert("✓ Codice dati copiato negli appunti! Ora puoi inviarlo al telefono tramite messaggio (WhatsApp, Telegram, Mail...)");
        }).catch(err => {
            // Alternativa se il browser blocca la clipboard
            alert("Copia manuale di questo codice:\n\n" + stringaTesto);
        });
    }

    function incollaTestoBackup() {
        const codiceInput = prompt("Incolla qui il codice di testo che hai copiato dall'altro dispositivo:");
        if (!codiceInput) return;
        try {
            const stringaDecodificata = atob(codiceInput.trim());
            const dati = JSON.parse(stringaDecodificata);
            if (applicaOggettoDati(dati)) {
                alert("✓ Sincronizzazione testo completata con successo!");
                salvaTutto();
            } else { alert("Codice non valido."); }
        } catch (err) {
            alert("Il testo inserito non è corretto o è danneggiato.");
        }
    }

    function resetDati() {
        if(confirm("Vuoi cancellare tutto?")) { localStorage.clear(); location.reload(); }
    }
    window.onload = aggiornaTutto;
</script>
</body>
</html>
