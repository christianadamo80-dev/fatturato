<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulatore Spese v2.5</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <h1>Simulatore Spese</h1>

  <section>
    <h2>Dati iniziali</h2>
    <label>Saldo attuale (€)</label>
    <input id="saldo" type="number" step="0.01" />

    <label>Soglia minima (€)</label>
    <input id="soglia" type="number" step="0.01" />
  </section>

  <section>
    <h2>Riepilogo</h2>
    <p>Saldo simulato attuale: <strong id="saldoFinale">€ 0</strong></p>
    <p>Saldo stimato fine mese: <strong id="saldoFineMese">€ 0</strong></p>
    <p>Saldo stimato al 31/12: <strong id="saldoFineAnno">€ 0</strong></p>
  </section>

  <section>
    <h2>Spese ricorrenti</h2>
    <p>(già presenti nella v2)</p>
  </section>

  <section>
    <h2>Movimenti futuri</h2>
    <p>(già presenti nella v2)</p>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
